<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Næringstrener | MatMinne</title>
    <style>
        body { background: var(--bakgrunn); }

        .nt-hero {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 45%, #4338ca 100%);
            padding: 56px 6% 52px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .nt-hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 25% 50%, rgba(99,102,241,.25) 0%, transparent 55%),
                        radial-gradient(ellipse at 75% 50%, rgba(167,139,250,.2) 0%, transparent 55%);
        }
        .nt-hero-inner { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }
        .nt-hero-icon { font-size: 3rem; margin-bottom: 14px; filter: drop-shadow(0 4px 12px rgba(0,0,0,.4)); }
        .nt-hero h1 {
            color: white; font-size: clamp(1.9rem, 4vw, 2.8rem);
            font-weight: 900; letter-spacing: -1.5px; margin: 0 0 10px;
        }
        .nt-hero p { color: rgba(255,255,255,.72); font-size: .96rem; margin: 0; line-height: 1.6; }

        .nt-wrap {
            max-width: 820px; margin: 0 auto;
            padding: 28px 16px 100px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .nt-card {
            background: white; border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 16px rgba(0,0,0,.05);
            overflow: hidden;
        }
        .nt-card-hode {
            padding: 16px 20px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 800; font-size: .88rem;
            color: #475569; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .nt-card-hode i { color: #6366f1; }
        .nt-card-kropp { padding: 20px; }

        #malInput {
            width: 100%; box-sizing: border-box;
            border: 2px solid #e2e8f0; border-radius: 14px;
            padding: 16px; font-size: .97rem; line-height: 1.6;
            color: #1e293b; resize: vertical; min-height: 100px;
            font-family: inherit; transition: border-color .2s;
            outline: none;
        }
        #malInput:focus { border-color: #6366f1; }
        #malInput::placeholder { color: #94a3b8; }

        .eksempel-label {
            font-size: .72rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 14px 0 8px;
        }
        .eksempel-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
        .eks-chip {
            padding: 6px 13px; border-radius: 99px;
            background: #f1f0ff; color: #4338ca;
            border: 1.5px solid #c7d2fe;
            font-size: .76rem; font-weight: 700; cursor: pointer;
            transition: all .15s;
        }
        .eks-chip:hover { background: #e0e7ff; border-color: #6366f1; }

        #genererBtn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #4338ca, #6366f1);
            color: white; border: none; border-radius: 14px;
            font-size: .95rem; font-weight: 800; cursor: pointer;
            transition: opacity .2s; letter-spacing: .3px;
        }
        #genererBtn:hover { opacity: .9; }
        #genererBtn:disabled { opacity: .6; cursor: not-allowed; }

        /* ── RESULTATER ── */
        .naering-summary {
            display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
            margin-bottom: 4px;
        }
        @media(max-width:560px) { .naering-summary { grid-template-columns: repeat(2,1fr); } }
        .ns-boks {
            border-radius: 14px; padding: 14px 12px; text-align: center;
        }
        .ns-boks .ns-tall { font-size: 1.55rem; font-weight: 900; line-height: 1; }
        .ns-boks .ns-enhet { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-top: 3px; opacity: .7; }
        .ns-boks .ns-label { font-size: .72rem; font-weight: 600; margin-top: 4px; }
        .ns-kcal  { background: #f0fdf4; color: #16a34a; }
        .ns-prot  { background: #eff6ff; color: #2563eb; }
        .ns-karbo { background: #fff7ed; color: #d97706; }
        .ns-fett  { background: #faf5ff; color: #7c3aed; }

        .tolka-maal {
            background: #f8fafc; border-radius: 12px;
            padding: 12px 16px; margin-bottom: 16px;
            font-size: .84rem; color: #475569; line-height: 1.5;
        }
        .tolka-maal strong { color: #1e293b; }

        /* ── MEAL CARDS ── */
        .maltid-kort {
            background: white; border-radius: 18px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
            overflow: hidden; margin-bottom: 14px;
        }
        .maltid-topp {
            padding: 16px 18px;
            display: flex; align-items: flex-start; gap: 14px;
            cursor: pointer; user-select: none;
        }
        .maltid-topp:hover { background: #fafbff; }
        .maltid-ikon {
            font-size: 1.9rem; line-height: 1;
            flex-shrink: 0; margin-top: 2px;
        }
        .maltid-info { flex: 1; min-width: 0; }
        .maltid-type {
            font-size: .62rem; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 3px;
        }
        .maltid-navn {
            font-size: 1.02rem; font-weight: 800; color: #1e293b;
            line-height: 1.25; margin-bottom: 8px;
        }
        .naering-badges { display: flex; flex-wrap: wrap; gap: 5px; }
        .nb {
            font-size: .7rem; font-weight: 700; padding: 3px 9px;
            border-radius: 99px;
        }
        .nb-kcal  { background: #dcfce7; color: #166534; }
        .nb-prot  { background: #dbeafe; color: #1e40af; }
        .nb-karbo { background: #ffedd5; color: #92400e; }
        .nb-fett  { background: #ede9fe; color: #5b21b6; }

        .maltid-pil {
            font-size: .8rem; color: #cbd5e1; margin-top: 4px;
            transition: transform .2s; flex-shrink: 0;
        }
        .maltid-pil.aapen { transform: rotate(180deg); }

        .maltid-oppskrift {
            display: none;
            border-top: 1px solid #f1f5f9;
            padding: 0 18px 18px;
        }
        .maltid-oppskrift.vis { display: block; }

        .opp-seksjon { margin-top: 14px; }
        .opp-seksjon-tittel {
            font-size: .62rem; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
        }
        .opp-tekst {
            font-size: .85rem; line-height: 1.75; color: #334155;
            white-space: pre-line;
        }

        .lagre-btn {
            margin-top: 14px; width: 100%; padding: 10px;
            background: linear-gradient(135deg, #4338ca, #6366f1);
            color: white; border: none; border-radius: 10px;
            font-weight: 700; font-size: .84rem; cursor: pointer;
        }
        .lagre-btn:hover { opacity: .9; }

        .laster-spinner {
            text-align: center; padding: 40px 20px; color: #6366f1;
        }
        .laster-spinner i { font-size: 2rem; margin-bottom: 12px; display: block; }
        .laster-spinner p { font-size: .88rem; color: #94a3b8; margin: 0; }

        /* ── KROPPSPROFIL ── */
        .profil-details {
            margin-top: 12px;
        }
        .profil-details summary {
            display: flex; align-items: center; gap: 8px;
            font-size: .78rem; font-weight: 700; color: #6366f1;
            cursor: pointer; user-select: none;
            padding: 10px 0 0;
            list-style: none;
            -webkit-tap-highlight-color: transparent;
        }
        .profil-details summary::-webkit-details-marker { display: none; }
        .profil-details summary:focus { outline: none; }
        .profil-details summary .chevron { font-size: .7rem; transition: transform .2s; margin-left: auto; }
        .profil-details[open] summary .chevron { transform: rotate(180deg); }

        .profil-felt { margin-top: 14px; }

        .profil-rad {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
        }
        .profil-gruppe { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 90px; }
        .profil-label {
            font-size: .68rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .8px;
        }
        .profil-input {
            border: 2px solid #e2e8f0; border-radius: 10px;
            padding: 9px 12px; font-size: .9rem; font-family: inherit;
            font-weight: 600; color: #1e293b; outline: none;
            transition: border-color .2s; background: #f8fafc; width: 100%; box-sizing: border-box;
        }
        .profil-input:focus { border-color: #6366f1; background: white; }

        .kjonn-rad { display: flex; gap: 8px; }
        .kjonn-btn {
            flex: 1; padding: 9px 10px; border-radius: 10px;
            border: 2px solid #e2e8f0; background: #f8fafc;
            font-size: .85rem; font-weight: 700; cursor: pointer;
            color: #64748b; transition: all .15s; font-family: inherit;
        }
        .kjonn-btn.valgt { border-color: #6366f1; background: #eef2ff; color: #4338ca; }

        @media (max-width: 600px) {
            .nt-hero { padding: 36px 5% 32px; }
            .nt-wrap { padding: 16px 12px 100px; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="nt-hero">
    <div class="nt-hero-inner">
        <div class="nt-hero-icon">&#x1F9EC;</div>
        <h1>Næringstrener</h1>
        <p>Fortell hva du ønsker å spise i dag — AI lager en skreddersydd dagsmeny med oppskrifter og næringsinnhold.</p>
    </div>
</div>

<div class="nt-wrap">

    <div class="nt-card" id="inputKort">
        <div class="nt-card-hode">
            <i class="fa-solid fa-bullseye"></i> Hva er målet ditt i dag?
        </div>
        <div class="nt-card-kropp">
            <textarea id="malInput" placeholder="F.eks: Jeg vil spise 100g protein i dag og gjerne ha noe godt til dessert..."></textarea>

            <!-- KROPPSPROFIL -->
            <div class="profil-felt" style="margin-top:14px;padding-top:14px;border-top:1px solid #f1f5f9;">
                <div style="font-size:.72rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">
                    <i class="fa-solid fa-person" style="color:#6366f1;"></i> Din profil (valgfritt — for tilpassede mengder)
                </div>
                <div class="profil-rad">
                    <div class="profil-gruppe" style="flex:2;min-width:140px;">
                        <span class="profil-label">Kjønn</span>
                        <div class="kjonn-rad">
                            <button type="button" class="kjonn-btn" id="kjonnMann" onclick="velgKjonn('Mann')">♂ Mann</button>
                            <button type="button" class="kjonn-btn" id="kjonnKvinne" onclick="velgKjonn('Kvinne')">♀ Kvinne</button>
                        </div>
                    </div>
                    <div class="profil-gruppe">
                        <label class="profil-label" for="vektInput">Vekt (kg)</label>
                        <input type="number" id="vektInput" class="profil-input" placeholder="70" min="30" max="250">
                    </div>
                    <div class="profil-gruppe">
                        <label class="profil-label" for="hoydeInput">Høyde (cm)</label>
                        <input type="number" id="hoydeInput" class="profil-input" placeholder="175" min="100" max="230">
                    </div>
                    <div class="profil-gruppe">
                        <label class="profil-label" for="alderInput">Alder</label>
                        <input type="number" id="alderInput" class="profil-input" placeholder="30" min="10" max="100">
                    </div>
                </div>
                <div class="profil-gruppe" style="max-width:300px;">
                    <label class="profil-label" for="aktivitetInput">Aktivitetsnivå</label>
                    <select id="aktivitetInput" class="profil-input">
                        <option value="">Velg aktivitetsnivå...</option>
                        <option value="Stillesittende (lite eller ingen trening)">Stillesittende</option>
                        <option value="Lett aktiv (lett trening 1-3 dager/uke)">Lett aktiv</option>
                        <option value="Moderat aktiv (moderat trening 3-5 dager/uke)">Moderat aktiv</option>
                        <option value="Veldig aktiv (hard trening 6-7 dager/uke)">Veldig aktiv</option>
                        <option value="Ekstremt aktiv (hardt fysisk arbeid + daglig trening)">Ekstremt aktiv</option>
                    </select>
                </div>
            </div>

            <div class="eksempel-label" style="margin-top:18px;">Prøv et eksempel</div>
            <div class="eksempel-chips">
                <button class="eks-chip" onclick="fyllEksempel('Jeg vil spise 100g protein i dag og trene etterpå')">100g protein</button>
                <button class="eks-chip" onclick="fyllEksempel('Jeg vil spise sunnere enn vanlig, men fortsatt unne meg noe godt')">Sunt + noe godt</button>
                <button class="eks-chip" onclick="fyllEksempel('Vegetarisk dag med masse grønnsaker og godt med energi')">Vegetarisk</button>
                <button class="eks-chip" onclick="fyllEksempel('Slankemåltider under 1500 kcal totalt for dagen, men mettende')">Under 1500 kcal</button>
                <button class="eks-chip" onclick="fyllEksempel('Norsk hverdagsmat, enkle retter, ca 2000 kcal')">Norsk hverdagsmat</button>
                <button class="eks-chip" onclick="fyllEksempel('Lav karbohydrat og høyt proteininntak, gjerne kjøtt og fisk')">Lav karbo</button>
            </div>

            <button id="genererBtn" onclick="genererDagsmeny()">
                <i class="fa-solid fa-dna"></i> Generer dagsmeny
            </button>
        </div>
    </div>

    <div id="ntResultat" style="display:none;"></div>

</div>

<div th:replace="~{fragments :: bottom_nav}"></div>
<div th:replace="~{fragments :: scripts}"></div>
<script src="/naeringstrener.js"></script>
</body>
</html>
