<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Handleliste | MatMinne</title>
    <style>
        body { background: var(--bakgrunn); }

        .page-hero {
            background: linear-gradient(160deg, #ecfdf5 0%, #d1fae5 60%, #bbf7d0 100%);
            border-bottom: 1px solid #a7f3d0;
            padding: 48px 0 64px;
            position: relative; overflow: hidden;
        }
        .page-hero::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(34,197,94,.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .hero-inner { position: relative; z-index: 1; }
        .hero-tag { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:2.5px; color:var(--mat-gronn-m); display:block; margin-bottom:10px; }
        .page-hero h1 { font-size:2.6rem; font-weight:900; letter-spacing:-2px; color:var(--mat-mork); margin:0 0 6px; }
        .page-hero p { color:#64748b; font-size:.9rem; margin:0; }

        .content-wrap { max-width:640px; margin:-36px auto 80px; padding:0 20px; position:relative; z-index:10; }

        /* ADD FORM */
        .add-card {
            background:white; border-radius:24px; padding:22px 24px;
            border:1px solid #f1f5f9; box-shadow:0 20px 56px rgba(0,0,0,.07);
            margin-bottom:20px;
        }
        .add-row { display:flex; gap:10px; flex-wrap:wrap; }
        .add-input {
            flex:1; min-width:180px; border:2px solid #f1f5f9; border-radius:14px;
            padding:12px 16px; font-size:.95rem; font-family:inherit; font-weight:500;
            color:var(--mat-mork); background:#f8fafc; outline:none; transition:.2s;
        }
        .add-input:focus { border-color:var(--mat-gronn); background:white; }
        .btn-add {
            background:var(--mat-gronn); color:white; border:none; padding:12px 22px;
            border-radius:14px; font-weight:800; font-size:.9rem; cursor:pointer;
            font-family:inherit; transition:.2s; white-space:nowrap;
            box-shadow:0 8px 24px rgba(46,204,113,.25);
        }
        .btn-add:hover { background:var(--mat-gronn-m); transform:translateY(-2px); }

        /* STATS */
        .stats-bar {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:14px; flex-wrap:wrap; gap:10px;
        }
        .stats-text { font-size:.8rem; font-weight:700; color:#94a3b8; }
        .progress-wrap { flex:1; min-width:120px; max-width:200px; }
        .progress-bar { height:6px; background:#f1f5f9; border-radius:99px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--mat-gronn); border-radius:99px; transition:width .4s; }

        /* LIST */
        .liste-card {
            background:white; border-radius:24px; border:1px solid #f1f5f9;
            box-shadow:0 4px 20px rgba(0,0,0,.04); overflow:hidden;
        }
        .liste-item {
            display:flex; align-items:center; gap:14px; padding:14px 20px;
            border-bottom:1px solid #f8fafc; transition:background .15s;
        }
        .liste-item:last-child { border-bottom:none; }
        .liste-item.ferdig { opacity:.5; }

        .check-btn {
            width:28px; height:28px; border-radius:9px;
            border:2px solid #cbd5e1; background:white; cursor:pointer;
            flex-shrink:0; display:flex; align-items:center; justify-content:center;
            transition:.2s; font-size:.9rem; font-family:inherit;
        }
        .liste-item.ferdig .check-btn { background:var(--mat-gronn); border-color:var(--mat-gronn); color:white; }

        .item-tekst { flex:1; font-size:.95rem; font-weight:600; color:var(--mat-mork); }
        .liste-item.ferdig .item-tekst { text-decoration:line-through; color:#94a3b8; }

        .btn-slett-item {
            background:none; border:none; color:#cbd5e1; cursor:pointer;
            font-size:.85rem; padding:4px; transition:color .2s;
        }
        .btn-slett-item:hover { color:#e74c3c; }

        .item-tekst { cursor:pointer; }
        .item-tekst:hover { color:var(--mat-gronn); }
        .edit-input {
            flex:1; border:2px solid var(--mat-gronn); border-radius:10px;
            padding:4px 10px; font-size:.95rem; font-family:inherit; font-weight:600;
            color:var(--mat-mork); outline:none; background:white;
        }

        .btn-slett-alt {
            background:white; border:1px solid #fecaca; color:#dc2626; padding:10px 18px;
            border-radius:12px; font-weight:700; font-size:.85rem; cursor:pointer;
            font-family:inherit; transition:.2s; display:flex; align-items:center; gap:7px;
        }
        .btn-slett-alt:hover { background:#fee2e2; }

        /* ACTIONS */
        .action-row { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
        .btn-action {
            background:white; border:1px solid #f1f5f9; color:#64748b; padding:10px 18px;
            border-radius:12px; font-weight:700; font-size:.85rem; cursor:pointer;
            font-family:inherit; transition:.2s; display:flex; align-items:center; gap:7px;
            text-decoration:none;
        }
        .btn-action:hover { background:#fee2e2; color:#dc2626; border-color:#fecaca; }
        .btn-action.green:hover { background:var(--mat-lys-gronn); color:var(--mat-gronn); border-color:var(--mat-gronn); }
        .btn-action.ai-btn {
            background: linear-gradient(135deg,#4338ca,#6366f1);
            color:white; border-color:transparent;
            box-shadow:0 4px 16px rgba(99,102,241,.3);
        }
        .btn-action.ai-btn:hover { opacity:.9; background: linear-gradient(135deg,#4338ca,#6366f1); color:white; border-color:transparent; }
        .btn-action.ai-btn:disabled { opacity:.6; cursor:not-allowed; }

        /* SMART SORT OVERLAY */
        .smart-overlay {
            display:none; position:fixed; inset:0; z-index:9000;
            background:rgba(15,23,42,.6); backdrop-filter:blur(4px);
            align-items:flex-end; justify-content:center;
        }
        .smart-overlay.vis { display:flex; }
        .smart-panel {
            background:white; border-radius:28px 28px 0 0;
            width:100%; max-width:640px; max-height:85vh;
            overflow-y:auto; padding:28px 24px 40px;
            animation: slideUp .3s ease;
        }
        @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
        .smart-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:20px;
        }
        .smart-title { font-size:1.15rem; font-weight:900; color:#1e293b; }
        .smart-close {
            background:#f1f5f9; border:none; border-radius:50%; width:36px; height:36px;
            cursor:pointer; font-size:1rem; color:#64748b; display:flex; align-items:center; justify-content:center;
        }
        .smart-gruppe { margin-bottom:20px; }
        .sg-header {
            display:flex; align-items:center; gap:8px;
            font-size:.75rem; font-weight:800; text-transform:uppercase;
            letter-spacing:1.5px; color:#64748b; margin-bottom:10px;
        }
        .sg-header span.sg-ikon { font-size:1.1rem; }
        .sg-varer { display:flex; flex-direction:column; gap:6px; }
        .sg-vare {
            display:flex; align-items:center; gap:10px;
            background:#f8fafc; border-radius:12px; padding:10px 14px;
            font-size:.9rem; font-weight:600; color:#1e293b;
        }
        .sg-vare i { color:#94a3b8; font-size:.75rem; }
        .smart-actions { display:flex; gap:10px; margin-top:24px; }
        .smart-btn {
            flex:1; padding:13px; border-radius:14px; border:none;
            font-weight:800; font-size:.9rem; cursor:pointer; font-family:inherit;
        }
        .smart-btn-apply {
            background:linear-gradient(135deg,#16a34a,#22c55e); color:white;
        }
        .smart-btn-cancel { background:#f1f5f9; color:#64748b; }
        .smart-laster { text-align:center; padding:40px 20px; color:#6366f1; }
        .smart-laster i { font-size:2rem; margin-bottom:10px; display:block; }

        /* EMPTY */
        .empty-state { text-align:center; padding:64px 20px; }
        .empty-icon { width:80px; height:80px; background:var(--mat-lys-gronn); border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:2.4rem; margin:0 auto 20px; }
        .empty-state h3 { font-weight:900; font-size:1.3rem; color:var(--mat-mork); margin-bottom:8px; }
        .empty-state p { color:#94a3b8; }

        .hidden-action { display:none !important; }

        /* Optimistic toggle animation */
        .liste-item { transition: opacity .2s; }
        .liste-item.removing { opacity: 0; transform: translateX(20px); transition: opacity .25s, transform .25s; }

        @media (max-width: 600px) {
            .page-hero { padding: 32px 0 48px; }
            .page-hero h1 { font-size: 2rem; letter-spacing: -1.5px; }
            .content-wrap { padding: 0 12px; margin-top: -24px; }
            .add-card { padding: 16px; }
            .add-row { gap: 8px; }
            .add-input { min-width: 0; }
            .action-row { gap: 8px; }
            .btn-action, .btn-slett-alt { padding: 9px 13px; font-size: .82rem; }
            .liste-item { padding: 12px 14px; gap: 10px; }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="page-hero">
        <div class="container hero-inner">
            <span class="hero-tag">Planlegging</span>
            <h1>Handleliste</h1>
            <p>Hold oversikt over hva du trenger å kjøpe</p>
        </div>
    </div>

    <div class="container">
        <div class="content-wrap">

            <!-- LEGG TIL -->
            <div class="add-card">
                <form th:action="@{/handleliste/legg-til}" method="POST" class="add-row">
                    <input type="text" name="tekst" class="add-input" placeholder="f.eks. 500g kyllingfilet" required>
                    <button type="submit" class="btn-add">
                        <i class="fa-solid fa-plus me-1"></i> Legg til
                    </button>
                </form>
            </div>

            <!-- STATS -->
            <div class="stats-bar" th:if="${antall > 0}">
                <span class="stats-text" th:text="${antallFerdig} + ' av ' + ${antall} + ' gjort'"></span>
                <div class="progress-wrap">
                    <div class="progress-bar">
                        <div class="progress-fill"
                             th:style="'width:' + ${antall > 0 ? (antallFerdig * 100 / antall) : 0} + '%'"></div>
                    </div>
                </div>
            </div>

            <!-- LISTE -->
            <div th:if="${items.isEmpty()}" class="liste-card" id="listeKort">
                <div class="empty-state">
                    <div class="empty-icon">🛒</div>
                    <h3>Handlelisten er tom</h3>
                    <p>Legg til varer manuelt, eller gå til en oppskrift og klikk "Legg i handleliste".</p>
                </div>
            </div>

            <div th:unless="${items.isEmpty()}" class="liste-card" id="listeKort">
                <div th:each="item : ${items}"
                     th:classappend="${item.ferdig} ? ' ferdig' : ''"
                     th:attr="data-id=${item.id}"
                     class="liste-item">
                    <button class="check-btn"
                            th:classappend="${item.ferdig} ? ' ferdig' : ''"
                            th:title="${item.ferdig ? 'Merk ugjort' : 'Merk gjort'}"
                            onclick="toggleItem(this)">
                        <i th:if="${item.ferdig}" class="fa-solid fa-check"></i>
                    </button>
                    <span class="item-tekst" th:text="${item.tekst}" onclick="startRediger(this)" title="Klikk for å redigere">Vare</span>
                    <button class="btn-slett-item" title="Slett" onclick="slettItem(this)">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <!-- ACTIONS -->
            <div class="action-row" th:if="${antall > 0}">
                <button class="btn-action ai-btn" id="smartSorterBtn" onclick="smartSorter(this)">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Smartsorter
                </button>
                <button class="btn-action" id="ryddBtn" onclick="ryddFerdig()"
                        th:style="${antallFerdig > 0} ? '' : 'display:none'">
                    <i class="fa-solid fa-broom"></i> Rydd ferdiggjorte
                </button>
                <button class="btn-slett-alt" onclick="slettAlt()">
                    <i class="fa-solid fa-trash"></i> Slett alt
                </button>
            </div>
            <div class="action-row">
                <a href="/ukesmeny" class="btn-action green">
                    <i class="fa-solid fa-calendar-week"></i> Gå til ukesmenyen
                </a>
            </div>

        </div>
    </div>

    <!-- SMART SORT OVERLAY -->
    <div class="smart-overlay" id="smartOverlay" onclick="lukkSmartOverlay(event)">
        <div class="smart-panel" id="smartPanel">
            <div class="smart-header">
                <span class="smart-title"><i class="fa-solid fa-wand-magic-sparkles" style="color:#6366f1;margin-right:8px;"></i>Smartsortert handleliste</span>
                <button class="smart-close" onclick="lukkSmartOverlay(null)"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="smartInnhold">
                <div class="smart-laster">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p style="color:#94a3b8;font-size:.88rem;margin:0;">AI sorterer og slår sammen varer...</p>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: bottom_nav}"></div>
    <div th:replace="~{fragments :: scripts}"></div>

    <script>
        function getItemId(el) {
            return el.closest('.liste-item').dataset.id;
        }

        function oppdaterStats() {
            const alle   = document.querySelectorAll('.liste-item');
            const ferdig = document.querySelectorAll('.liste-item.ferdig');
            const statsText = document.querySelector('.stats-text');
            const fill      = document.querySelector('.progress-fill');
            const statsBar  = document.querySelector('.stats-bar');
            const ryddBtn   = document.getElementById('ryddBtn');

            if (statsBar) statsBar.style.display = alle.length > 0 ? 'flex' : 'none';
            if (statsText) statsText.textContent = ferdig.length + ' av ' + alle.length + ' gjort';
            if (fill) fill.style.width = (alle.length > 0 ? (ferdig.length * 100 / alle.length) : 0) + '%';
            if (ryddBtn) ryddBtn.style.display = ferdig.length > 0 ? '' : 'none';
        }

        function toggleItem(btn) {
            const item = btn.closest('.liste-item');
            const id   = item.dataset.id;
            const erFerdig = item.classList.contains('ferdig');

            // Optimistic UI
            item.classList.toggle('ferdig', !erFerdig);
            btn.classList.toggle('ferdig', !erFerdig);
            if (!erFerdig) {
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else {
                btn.innerHTML = '';
            }
            oppdaterStats();

            csrfFetch('/handleliste/toggle/' + id, { method: 'POST' })
                .then(r => { if (!r.ok) location.reload(); })
                .catch(() => location.reload());
        }

        function slettItem(btn) {
            const item = btn.closest('.liste-item');
            const id   = item.dataset.id;

            item.classList.add('removing');
            setTimeout(() => item.remove(), 260);
            oppdaterStats();

            // Vis tom-tilstand hvis siste element
            setTimeout(() => {
                const kort = document.getElementById('listeKort');
                if (kort && kort.querySelectorAll('.liste-item').length === 0) {
                    kort.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><h3>Handlelisten er tom</h3><p>Legg til varer manuelt, eller gå til en oppskrift og klikk "Legg i handleliste".</p></div>';
                }
                oppdaterStats();
            }, 300);

            csrfFetch('/handleliste/slett/' + id, { method: 'POST' })
                .then(r => { if (!r.ok) location.reload(); })
                .catch(() => location.reload());
        }

        function ryddFerdig() {
            if (!confirm('Fjerne alle gjorte varer?')) return;
            document.querySelectorAll('.liste-item.ferdig').forEach(item => {
                item.classList.add('removing');
                setTimeout(() => item.remove(), 260);
            });
            setTimeout(oppdaterStats, 300);
            csrfFetch('/handleliste/rydd', { method: 'POST' })
                .then(r => { if (!r.ok) location.reload(); })
                .catch(() => location.reload());
        }

        function slettAlt() {
            if (!confirm('Slette hele handlelisten?')) return;
            document.querySelectorAll('.liste-item').forEach(item => {
                item.classList.add('removing');
                setTimeout(() => item.remove(), 260);
            });
            setTimeout(() => {
                const kort = document.getElementById('listeKort');
                if (kort) kort.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><h3>Handlelisten er tom</h3><p>Legg til varer manuelt, eller gå til en oppskrift og klikk "Legg i handleliste".</p></div>';
                oppdaterStats();
            }, 300);
            csrfFetch('/handleliste/slett-alt', { method: 'POST' })
                .then(r => { if (!r.ok) location.reload(); })
                .catch(() => location.reload());
        }

        // Tving reload ved tilbake-navigering (unngår bfcache)
        window.addEventListener('pageshow', e => { if (e.persisted) location.reload(); });

        // ── SMART SORTER ──────────────────────────────────────────────
        let smartResultat = null;

        function smartSorter(btn) {
            const varer = [];
            document.querySelectorAll('.liste-item .item-tekst').forEach(el => {
                const tekst = el.textContent.trim();
                if (tekst) varer.push(tekst);
            });
            if (varer.length === 0) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sorterer...';

            document.getElementById('smartOverlay').classList.add('vis');
            document.getElementById('smartInnhold').innerHTML =
                '<div class="smart-laster"><i class="fa-solid fa-spinner fa-spin"></i>' +
                '<p style="color:#94a3b8;font-size:.88rem;margin:0;">AI sorterer og slår sammen varer...</p></div>';

            csrfFetch('/api/handleliste/smartsorter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ varer: varer })
            })
            .then(r => r.json())
            .then(data => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Smartsorter';
                if (data.feil) {
                    visSmartFeil(data.feil);
                    return;
                }
                smartResultat = data;
                visSmartResultat(data);
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Smartsorter';
                visSmartFeil('Noe gikk galt. Prøv igjen.');
            });
        }

        function visSmartResultat(data) {
            let html = '';
            (data.grupper || []).forEach(g => {
                html += '<div class="smart-gruppe">' +
                    '<div class="sg-header"><span class="sg-ikon">' + g.ikon + '</span>' + g.navn + '</div>' +
                    '<div class="sg-varer">';
                (g.varer || []).forEach(v => {
                    html += '<div class="sg-vare"><i class="fa-solid fa-circle-dot"></i>' + escHtml(v) + '</div>';
                });
                html += '</div></div>';
            });
            html += '<div class="smart-actions">' +
                '<button class="smart-btn smart-btn-cancel" onclick="lukkSmartOverlay(null)">Avbryt</button>' +
                '<button class="smart-btn smart-btn-apply" onclick="brukSmartSortering()">Bruk denne sorteringen</button>' +
                '</div>';
            document.getElementById('smartInnhold').innerHTML = html;
        }

        function visSmartFeil(msg) {
            document.getElementById('smartInnhold').innerHTML =
                '<p style="color:#ef4444;text-align:center;padding:20px;">' + escHtml(msg) + '</p>' +
                '<button class="smart-btn smart-btn-cancel" style="width:100%;" onclick="lukkSmartOverlay(null)">Lukk</button>';
        }

        function brukSmartSortering() {
            if (!smartResultat || !smartResultat.grupper) return;
            const kort = document.getElementById('listeKort');
            if (!kort) return;
            // Clear current items
            kort.innerHTML = '';
            smartResultat.grupper.forEach(g => {
                // Group header
                const headerDiv = document.createElement('div');
                headerDiv.style.cssText = 'padding:10px 20px 4px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;display:flex;align-items:center;gap:6px;background:#f8fafc;border-bottom:1px solid #f1f5f9;';
                headerDiv.innerHTML = '<span>' + g.ikon + '</span>' + escHtml(g.navn);
                kort.appendChild(headerDiv);
                (g.varer || []).forEach(v => {
                    const item = document.createElement('div');
                    item.className = 'liste-item';
                    item.dataset.id = 'smart-' + Math.random().toString(36).slice(2);
                    item.innerHTML =
                        '<span class="item-tekst" style="cursor:default;">' + escHtml(v) + '</span>';
                    kort.appendChild(item);
                });
            });
            lukkSmartOverlay(null);
        }

        function lukkSmartOverlay(e) {
            if (e && e.target !== document.getElementById('smartOverlay')) return;
            document.getElementById('smartOverlay').classList.remove('vis');
            smartResultat = null;
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function startRediger(span) {
            if (span.closest('.liste-item').classList.contains('ferdig')) return;
            const gammelTekst = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = gammelTekst;
            span.replaceWith(input);
            input.focus();
            input.select();

            function lagre() {
                const nyTekst = input.value.trim();
                const id = input.closest('.liste-item').dataset.id;
                const nySpan = document.createElement('span');
                nySpan.className = 'item-tekst';
                nySpan.title = 'Klikk for å redigere';
                nySpan.onclick = function() { startRediger(this); };
                nySpan.textContent = nyTekst || gammelTekst;
                input.replaceWith(nySpan);
                if (nyTekst && nyTekst !== gammelTekst) {
                    csrfFetch('/handleliste/endre/' + id, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tekst: nyTekst })
                    }).catch(() => { nySpan.textContent = gammelTekst; });
                }
            }

            input.addEventListener('blur', lagre);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') input.blur();
                if (e.key === 'Escape') { input.value = gammelTekst; input.blur(); }
            });
        }
    </script>
</body>
</html>
