<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Ukesmeny | MatMinne</title>
    <style>
        body { background: var(--bakgrunn); }

        /* ── HERO ─────────────────────────────────────────── */
        .hero {
            background: linear-gradient(160deg, #ecfdf5 0%, #d1fae5 60%, #bbf7d0 100%);
            border-bottom: 1px solid #a7f3d0;
            padding: 40px 0 56px;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content:''; position:absolute; inset:0;
            background-image: radial-gradient(rgba(34,197,94,.12) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .hero-inner { position: relative; z-index: 1; }
        .hero-tag { font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:2.5px; color:var(--mat-gronn-m); display:block; margin-bottom:8px; }
        .hero h1 { font-size:2.4rem; font-weight:900; letter-spacing:-2px; color:var(--mat-mork); margin:0 0 4px; }
        .hero p { color:#64748b; font-size:.88rem; margin:0; }

        /* ── WRAP ─────────────────────────────────────────── */
        .wrap { max-width:900px; margin:-32px auto 100px; padding:0 20px; position:relative; z-index:10; }

        /* ── AI-BANNER ────────────────────────────────────── */
        .ai-banner {
            background: linear-gradient(135deg,#f0fdf4,#dcfce7);
            border: 1.5px solid #a7f3d0; border-radius:16px;
            padding:14px 18px; margin-bottom:20px;
            display:flex; align-items:center; gap:12px; font-size:.88rem; color:var(--mat-mork);
        }
        .ai-banner strong { font-weight:900; }

        /* ── TOP-KNAPPER ──────────────────────────────────── */
        .top-bar { display:flex; justify-content:flex-end; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .btn {
            background:white; border:1px solid #e2e8f0; color:#64748b;
            padding:9px 16px; border-radius:12px; font-weight:700; font-size:.82rem;
            cursor:pointer; font-family:inherit; transition:.18s;
            display:inline-flex; align-items:center; gap:6px; text-decoration:none;
        }
        .btn:hover { background:#f0fdf4; color:var(--mat-gronn); border-color:var(--mat-gronn); }
        .btn.primary { background:var(--mat-gronn); color:white; border-color:var(--mat-gronn); box-shadow:0 4px 14px rgba(46,204,113,.3); }
        .btn.primary:hover { background:var(--mat-gronn-m); }
        .btn.ai { background:linear-gradient(135deg,#f0fdf4,#dcfce7); color:var(--mat-gronn); border-color:#a7f3d0; }
        .btn.ai:hover { background:var(--mat-lys-gronn); }

        /* ── DAG-TABS ─────────────────────────────────────── */
        .dag-tabs {
            display:flex; gap:6px; overflow-x:auto; padding-bottom:4px;
            margin-bottom:20px; scrollbar-width:none;
        }
        .dag-tabs::-webkit-scrollbar { display:none; }
        .dag-tab {
            flex-shrink:0; padding:8px 18px; border-radius:12px; font-weight:800;
            font-size:.8rem; cursor:pointer; border:1.5px solid #e2e8f0;
            background:white; color:#94a3b8; transition:.18s; white-space:nowrap;
            font-family:inherit;
        }
        .dag-tab:hover { border-color:var(--mat-gronn); color:var(--mat-gronn); }
        .dag-tab.aktiv {
            background:var(--mat-gronn); color:white; border-color:var(--mat-gronn);
            box-shadow:0 4px 12px rgba(46,204,113,.3);
        }

        /* ── DAG-PANEL ────────────────────────────────────── */
        .dag-panel { display:none; }
        .dag-panel.aktiv { display:block; animation: fadeUp .22s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── MALTID-GRID ──────────────────────────────────── */
        .maltid-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
        @media (max-width:640px) { .maltid-grid { grid-template-columns:1fr; } }

        /* ── MALTID-KORT ──────────────────────────────────── */
        .maltid-kort {
            background:white; border-radius:18px; overflow:hidden;
            border:1px solid #f1f5f9; box-shadow:0 2px 12px rgba(0,0,0,.05);
            display:flex; flex-direction:column;
        }
        .kortHeader {
            padding:12px 16px 10px; display:flex; align-items:center; gap:8px;
            font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px;
        }
        .kortHeader .ikon { font-size:1.1rem; }

        /* farger per måltid */
        .frokost-header { background:#fffbeb; color:#b45309; border-bottom:1px solid #fde68a; }
        .lunsj-header   { background:#eff6ff; color:#2563eb; border-bottom:1px solid #bfdbfe; }
        .middag-header  { background:#f0fdf4; color:#16a34a; border-bottom:1px solid #bbf7d0; }

        .kortBody { padding:14px 16px; flex:1; display:flex; flex-direction:column; gap:10px; }

        /* fylt slot */
        .maltid-tittel { font-size:.9rem; font-weight:700; color:var(--mat-mork); line-height:1.35; flex:1; }
        .fjern-btn {
            align-self:flex-end; background:none; border:none; color:#cbd5e1;
            cursor:pointer; font-size:.8rem; padding:4px 8px; border-radius:8px; transition:.15s;
            font-family:inherit; font-weight:700;
        }
        .fjern-btn:hover { background:#fee2e2; color:#ef4444; }

        /* tom slot */
        .tom-form { display:flex; gap:8px; align-items:center; flex:1; }
        .tom-input {
            flex:1; border:1.5px dashed #e2e8f0; border-radius:10px;
            padding:8px 10px; font-size:.8rem; font-family:inherit; font-weight:600;
            color:var(--mat-mork); background:#f8fafc; outline:none; min-width:0;
        }
        .tom-input:focus { border-color:var(--mat-gronn); background:white; border-style:solid; }
        .tom-input::placeholder { color:#cbd5e1; font-weight:500; }
        .legg-til-btn {
            width:34px; height:34px; background:var(--mat-gronn); color:white; border:none;
            border-radius:10px; font-size:1.2rem; font-weight:900; cursor:pointer;
            flex-shrink:0; transition:.15s; display:flex; align-items:center; justify-content:center;
        }
        .legg-til-btn:hover { background:var(--mat-gronn-m); }

        /* tom uke */
        .tom-uke {
            text-align:center; padding:60px 20px;
            background:white; border-radius:20px; border:1.5px dashed #e2e8f0;
        }
        .tom-uke .big-ikon { font-size:3rem; margin-bottom:12px; }
        .tom-uke h3 { font-weight:900; color:var(--mat-mork); margin:0 0 6px; }
        .tom-uke p { font-size:.85rem; color:#94a3b8; margin:0; }
    </style>
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero">
        <div class="container hero-inner">
            <span class="hero-tag">Planlegging</span>
            <h1>Ukesmeny</h1>
            <p>Planlegg hele uken — generer handleliste med ett klikk</p>
        </div>
    </div>

    <div class="container">
        <div class="wrap">

            <!-- AI-suksess-banner -->
            <div class="ai-banner" th:if="${param.ai != null}">
                <span style="font-size:1.4rem">✨</span>
                <div><strong>AI-ukesmenyen er klar!</strong> — Claude har laget en personlig plan for deg. Juster gjerne enkeltdager.</div>
            </div>

            <!-- Handlingsknapper -->
            <div class="top-bar">
                <a href="/handleliste" class="btn">
                    <i class="fa-solid fa-cart-shopping"></i> Handleliste
                </a>
                <a href="/ukesmeny/ai" class="btn ai" th:if="${harAbonnement}">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Ny AI-ukeplan
                </a>
                <a href="/abonnement" class="btn ai" th:unless="${harAbonnement}">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> AI-ukeplan ✨
                </a>
                <form action="/ukesmeny/til-handleliste" method="POST" style="margin:0;">
                    <button type="submit" class="btn primary"
                            onclick="return confirm('Legg alle ingredienser i handlelisten?')">
                        <i class="fa-solid fa-cart-plus"></i> Til handleliste
                    </button>
                </form>
            </div>

            <!-- Dag-tabs -->
            <div class="dag-tabs" id="dagTabs">
                <button th:each="dp,idx : ${dagPlaner}"
                        th:text="${dp.dag}"
                        th:data-idx="${idx.index}"
                        th:classappend="${idx.index == 0 ? ' aktiv' : ''}"
                        class="dag-tab"
                        onclick="byttDag(this)">
                </button>
            </div>

            <!-- Dag-paneler -->
            <div th:each="dp,idx : ${dagPlaner}"
                 th:id="'panel-' + ${idx.index}"
                 th:classappend="${idx.index == 0 ? ' aktiv' : ''}"
                 class="dag-panel">

                <div class="maltid-grid">

                    <!-- FROKOST -->
                    <div class="maltid-kort">
                        <div class="kortHeader frokost-header">
                            <span class="ikon">🌅</span> Frokost
                        </div>
                        <div class="kortBody">
                            <div th:if="${dp.frokost != null}" style="display:flex;flex-direction:column;gap:8px;flex:1">
                                <span class="maltid-tittel" th:text="${dp.frokost.oppskriftTittel}"></span>
                                <form th:action="@{'/ukesmeny/fjern/' + ${dp.frokost.id}}" method="POST" style="margin:0;align-self:flex-end">
                                    <button type="submit" class="fjern-btn">Fjern ✕</button>
                                </form>
                            </div>
                            <div th:unless="${dp.frokost != null}" class="tom-form">
                                <form action="/ukesmeny/legg-til" method="POST" style="display:contents">
                                    <input type="hidden" name="dag" th:value="${dp.dag}">
                                    <input type="hidden" name="maltid" value="Frokost">
                                    <input type="text" name="tittel" class="tom-input" placeholder="Legg til..." required>
                                    <button type="submit" class="legg-til-btn">+</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- LUNSJ -->
                    <div class="maltid-kort">
                        <div class="kortHeader lunsj-header">
                            <span class="ikon">☀️</span> Lunsj
                        </div>
                        <div class="kortBody">
                            <div th:if="${dp.lunsj != null}" style="display:flex;flex-direction:column;gap:8px;flex:1">
                                <span class="maltid-tittel" th:text="${dp.lunsj.oppskriftTittel}"></span>
                                <form th:action="@{'/ukesmeny/fjern/' + ${dp.lunsj.id}}" method="POST" style="margin:0;align-self:flex-end">
                                    <button type="submit" class="fjern-btn">Fjern ✕</button>
                                </form>
                            </div>
                            <div th:unless="${dp.lunsj != null}" class="tom-form">
                                <form action="/ukesmeny/legg-til" method="POST" style="display:contents">
                                    <input type="hidden" name="dag" th:value="${dp.dag}">
                                    <input type="hidden" name="maltid" value="Lunsj">
                                    <input type="text" name="tittel" class="tom-input" placeholder="Legg til..." required>
                                    <button type="submit" class="legg-til-btn">+</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- MIDDAG -->
                    <div class="maltid-kort">
                        <div class="kortHeader middag-header">
                            <span class="ikon">🌙</span> Middag
                        </div>
                        <div class="kortBody">
                            <div th:if="${dp.middag != null}" style="display:flex;flex-direction:column;gap:8px;flex:1">
                                <span class="maltid-tittel" th:text="${dp.middag.oppskriftTittel}"></span>
                                <form th:action="@{'/ukesmeny/fjern/' + ${dp.middag.id}}" method="POST" style="margin:0;align-self:flex-end">
                                    <button type="submit" class="fjern-btn">Fjern ✕</button>
                                </form>
                            </div>
                            <div th:unless="${dp.middag != null}" class="tom-form">
                                <form action="/ukesmeny/legg-til" method="POST" style="display:contents">
                                    <input type="hidden" name="dag" th:value="${dp.dag}">
                                    <input type="hidden" name="maltid" value="Middag">
                                    <input type="text" name="tittel" class="tom-input" placeholder="Legg til..." required>
                                    <button type="submit" class="legg-til-btn">+</button>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments :: bottom_nav}"></div>
    <div th:replace="~{fragments :: scripts}"></div>
    <script>
        function byttDag(knapp) {
            document.querySelectorAll('.dag-tab').forEach(t => t.classList.remove('aktiv'));
            document.querySelectorAll('.dag-panel').forEach(p => p.classList.remove('aktiv'));
            knapp.classList.add('aktiv');
            document.getElementById('panel-' + knapp.dataset.idx).classList.add('aktiv');
        }
    </script>
</body>
</html>
