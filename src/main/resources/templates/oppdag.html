<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Utforsk | MatMinne</title>

    <style>
        body { background: var(--bakgrunn); }

        /* ── HERO ── */
        .explore-hero {
            background: linear-gradient(160deg, #ecfdf5 0%, #d1fae5 60%, #bbf7d0 100%);
            border-bottom: 1px solid #a7f3d0;
            padding: 60px 0 96px;
            position: relative;
            overflow: hidden;
        }
        .explore-hero::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(34,197,94,.15) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .hero-glow {
            position: absolute; right: -100px; top: -100px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(34,197,94,.2), transparent 65%);
            pointer-events: none;
        }
        .explore-hero-inner { position: relative; z-index: 2; }
        .explore-tag {
            font-size: .68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2.5px; color: var(--mat-gronn-m); display: block; margin-bottom: 12px;
        }
        .explore-hero h1 {
            font-size: clamp(2.4rem, 4vw, 3.8rem); font-weight: 900;
            letter-spacing: -2.5px; color: var(--mat-mork); margin: 0 0 10px; line-height: 1;
        }
        .explore-hero p { color: #64748b; font-size: .95rem; margin: 0; max-width: 400px; }

        /* ── SEARCH FLOAT ── */
        .search-float {
            max-width: 760px; margin: -32px auto 0; padding: 0 20px; position: relative; z-index: 10;
        }
        .search-inner {
            background: white; border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,.12); border: 1px solid #f1f5f9;
            display: flex; align-items: center; padding: 6px 6px 6px 22px; gap: 12px;
        }
        .search-inner i { color: var(--mat-gronn); font-size: 1rem; flex-shrink: 0; }
        .search-inner input {
            flex: 1; border: none; outline: none; font-family: inherit;
            font-size: 1rem; font-weight: 500; color: var(--mat-mork); background: transparent; padding: 10px 0;
        }
        .search-inner input::placeholder { color: #cbd5e1; }
        .search-btn {
            background: var(--mat-mork); color: white; border: none;
            padding: 12px 24px; border-radius: 15px; font-weight: 800; font-size: .88rem;
            cursor: pointer; font-family: inherit; transition: .2s; white-space: nowrap;
        }
        .search-btn:hover { background: var(--mat-gronn); }

        /* ── FILTER BAR ── */
        .filter-wrap {
            max-width: 760px; margin: 0 auto; padding: 16px 20px 0;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .filter-chip {
            padding: 7px 16px; border-radius: 99px; font-size: .8rem; font-weight: 700;
            border: 1.5px solid #e2e8f0; color: #64748b; text-decoration: none;
            transition: .18s; white-space: nowrap; background: white;
        }
        .filter-chip:hover { border-color: var(--mat-gronn); color: var(--mat-gronn); }
        .filter-chip.active { background: var(--mat-gronn); border-color: var(--mat-gronn); color: white; }
        .filter-sort {
            margin-left: auto; padding: 7px 14px; border-radius: 99px; font-size: .8rem;
            font-weight: 700; border: 1.5px solid #e2e8f0; color: #64748b; background: white;
            cursor: pointer; font-family: inherit; outline: none; transition: .2s;
        }
        .filter-sort:hover, .filter-sort:focus { border-color: var(--mat-gronn); color: var(--mat-gronn); }

        /* ── GRID ── */
        .explore-section { padding: 44px 0 110px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
        }
        .section-count { font-size: .82rem; font-weight: 700; color: #94a3b8; }
        .reset-link { font-size: .8rem; font-weight: 700; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .reset-link:hover { color: var(--mat-mork); }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }

        /* ── CARD ── */
        .kort {
            background: white; border-radius: 22px; overflow: hidden;
            border: 1px solid #f1f5f9; display: flex; flex-direction: column;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
            transition: transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s;
        }
        .kort:hover { transform: translateY(-7px); box-shadow: 0 22px 52px rgba(0,0,0,.09); }

        .kort-img { height: 210px; position: relative; overflow: hidden; }
        .kort-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
        .kort:hover .kort-img img { transform: scale(1.07); }

        .chef-badge {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(255,255,255,.9); backdrop-filter: blur(10px);
            padding: 5px 12px; border-radius: 10px; font-size: .72rem; font-weight: 700;
            color: var(--mat-mork); text-decoration: none;
            display: flex; align-items: center; gap: 5px; transition: .2s;
        }
        .chef-badge:hover { background: var(--mat-gronn); color: white; }

        .kat-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(15,30,20,.75); backdrop-filter: blur(8px);
            color: var(--mat-gronn); font-size: .68rem; font-weight: 800;
            padding: 4px 11px; border-radius: 99px; letter-spacing: .5px;
        }

        .kort-body { padding: 18px 20px 18px; flex-grow: 1; display: flex; flex-direction: column; }

        .kort-meta { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .kort-meta span {
            font-size: .71rem; font-weight: 700; color: #94a3b8;
            display: flex; align-items: center; gap: 4px;
        }
        .kort-meta i { color: var(--mat-gronn); font-size: .65rem; }

        .kort-title {
            font-weight: 800; font-size: 1.05rem; color: var(--mat-mork);
            letter-spacing: -.3px; line-height: 1.35; text-decoration: none;
            display: block; flex-grow: 1; margin-bottom: 14px; transition: color .2s;
        }
        .kort-title:hover { color: var(--mat-gronn); }

        .kort-actions { display: flex; gap: 8px; }
        .btn-see {
            flex: 1; background: #f1f5f9; color: var(--mat-mork); text-decoration: none;
            text-align: center; padding: 11px 14px; border-radius: 12px;
            font-weight: 700; font-size: .88rem; transition: .2s;
        }
        .btn-see:hover { background: var(--mat-mork); color: white; }
        .btn-save {
            flex: 1; background: var(--mat-gronn); color: white; border: none;
            padding: 11px 14px; border-radius: 12px; font-weight: 700; font-size: .88rem;
            cursor: pointer; transition: .2s; font-family: inherit; text-align: center;
        }
        .btn-save:hover { background: var(--mat-gronn-m); }

        /* ── TRENDING ── */
        .trending-section { padding: 36px 0 0; }
        .trending-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .trending-title { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
        .trending-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: .6rem; font-weight: 900; padding: 3px 8px; border-radius: 99px; letter-spacing: .5px; text-transform: uppercase; }
        .trending-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .trending-scroll::-webkit-scrollbar { display: none; }
        .trending-kort {
            min-width: 200px; max-width: 200px; border-radius: 18px; overflow: hidden;
            background: white; border: 1px solid #f1f5f9; flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
            transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
            text-decoration: none; display: block;
        }
        .trending-kort:hover { transform: translateY(-5px); box-shadow: 0 16px 36px rgba(0,0,0,.09); }
        .trending-img { height: 130px; overflow: hidden; position: relative; }
        .trending-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; display: block; }
        .trending-kort:hover .trending-img img { transform: scale(1.07); }
        .trending-rank {
            position: absolute; top: 8px; left: 8px;
            width: 28px; height: 28px; border-radius: 9px;
            background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
            color: white; font-size: .75rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }
        .trending-body { padding: 12px 14px; }
        .trending-name { font-size: .85rem; font-weight: 800; color: var(--mat-mork); line-height: 1.3; margin-bottom: 6px; }
        .trending-meta { font-size: .68rem; color: #94a3b8; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .trending-meta i { color: #ef4444; font-size: .65rem; }

        /* ── EMPTY ── */
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-icon {
            width: 88px; height: 88px; background: var(--mat-lys-gronn); border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.6rem; margin: 0 auto 24px;
        }
        .empty-state h3 { font-weight: 900; font-size: 1.4rem; letter-spacing: -.5px; color: var(--mat-mork); margin-bottom: 8px; }
        .empty-state p { color: #94a3b8; margin-bottom: 24px; }
        .btn-share {
            background: var(--mat-gronn); color: white; text-decoration: none;
            padding: 12px 28px; border-radius: 14px; font-weight: 800;
            display: inline-flex; align-items: center; gap: 8px; transition: .2s;
            box-shadow: 0 8px 24px rgba(46,204,113,.25);
        }
        .btn-share:hover { background: var(--mat-gronn-m); transform: translateY(-2px); color: white; }

        @media (max-width: 600px) {
            .recipe-grid { grid-template-columns: 1fr; }
            .filter-sort { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="explore-hero">
        <div class="hero-glow"></div>
        <div class="container explore-hero-inner">
            <span class="explore-tag">Oppdag</span>
            <h1>Utforsk kjøkkenet</h1>
            <p>Inspirer deg med oppskrifter fra hele MatMinne-fellesskapet</p>
        </div>
    </div>

    <form action="/oppdag" method="GET">
        <input type="hidden" name="kategori" th:value="${aktivKategori}">
        <div class="search-float">
            <div class="search-inner">
                <i class="fas fa-search"></i>
                <input type="text" name="q" th:value="${sokeTekst}" placeholder="Søk på rett, ingrediens, kokk...">
                <button type="submit" class="search-btn"><i class="fas fa-search me-1"></i> Søk</button>
            </div>
        </div>
    </form>

    <div class="filter-wrap">
        <a th:href="@{/oppdag(q=${sokeTekst})}"
           th:classappend="${aktivKategori == null || aktivKategori == ''} ? ' active' : ''"
           class="filter-chip">Alle</a>
        <a th:each="kat : ${ {'Frokost','Lunsj','Middag','Dessert','Snacks','Drikke','Annet'} }"
           th:href="@{/oppdag(q=${sokeTekst}, kategori=${kat})}"
           th:text="${kat}"
           th:classappend="${aktivKategori == kat} ? ' active' : ''"
           class="filter-chip">Kategori</a>
        <form action="/oppdag" method="GET" style="margin-left:auto;display:flex;">
            <input type="hidden" name="q" th:value="${sokeTekst}">
            <input type="hidden" name="kategori" th:value="${aktivKategori}">
            <select name="sorter" class="filter-sort" onchange="this.form.submit()">
                <option value="nyest" th:selected="${sortering == 'nyest' || sortering == null}">Nyeste først</option>
                <option value="eldst" th:selected="${sortering == 'eldst'}">Eldste først</option>
            </select>
        </form>
    </div>

    <!-- TRENDING -->
    <div class="container trending-section" th:if="${trending != null and !#lists.isEmpty(trending)}">
        <div class="trending-header">
            <span class="trending-title">Trending</span>
            <span class="trending-badge">🔥 Mest likt</span>
        </div>
        <div class="trending-scroll">
            <a th:each="o, iter : ${trending}"
               th:href="@{'/detaljer/' + ${o.id}}"
               class="trending-kort">
                <div class="trending-img">
                    <img th:src="${o.bildeUrl != null && o.bildeUrl != '' ? o.bildeUrl : 'https://images.unsplash.com/photo-1543353071-873f17a7a088?auto=format&fit=crop&w=400&q=70'}" alt="" loading="lazy">
                    <div class="trending-rank" th:text="${iter.index + 1}">1</div>
                </div>
                <div class="trending-body">
                    <div class="trending-name" th:text="${o.tittel}">Tittel</div>
                    <div class="trending-meta">
                        <i class="fas fa-heart"></i>
                        <span th:text="${o.brukerNavn}">Kokk</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="container explore-section">
        <div class="section-header">
            <span class="section-count"
                  th:text="${#lists.size(oppskrifter)} + ' oppskrift' + (${#lists.size(oppskrifter)} == 1 ? '' : 'er')">
            </span>
            <a th:if="${(sokeTekst != null and sokeTekst != '') or (aktivKategori != null and aktivKategori != '')}"
               href="/oppdag" class="reset-link">
                <i class="fas fa-xmark"></i> Nullstill filter
            </a>
        </div>

        <div th:if="${#lists.isEmpty(oppskrifter)}" class="empty-state">
            <div class="empty-icon">👨‍🍳</div>
            <h3>Ingen oppskrifter funnet</h3>
            <p th:if="${sokeTekst != null and sokeTekst != ''}">Ingen treff for "<span th:text="${sokeTekst}"></span>"</p>
            <p th:unless="${sokeTekst != null and sokeTekst != ''}">Vær den første til å dele noe deilig!</p>
            <a href="/ny-oppskrift" class="btn-share"><i class="fa-solid fa-plus"></i> Del en oppskrift</a>
        </div>

        <div class="recipe-grid" th:unless="${#lists.isEmpty(oppskrifter)}">
            <div th:each="o : ${oppskrifter}" class="kort">
                <div class="kort-img">
                    <img th:src="${o.bildeUrl != null && o.bildeUrl != '' ? o.bildeUrl : 'https://images.unsplash.com/photo-1543353071-873f17a7a088?auto=format&fit=crop&w=600&q=70'}" alt="">
                    <a th:href="@{'/profil/' + ${o.brukerEpost}}" class="chef-badge">
                        <i class="fa-solid fa-user"></i>
                        <span th:text="${o.brukerNavn}">Kokk</span>
                    </a>
                    <span th:if="${o.kategori != null}" class="kat-badge" th:text="${o.kategori}"></span>
                </div>
                <div class="kort-body">
                    <div class="kort-meta" th:if="${o.tilberedningstid != null or o.porsjoner != null or o.vanskelighet != null}">
                        <span th:if="${o.tilberedningstid != null}">
                            <i class="fas fa-clock"></i> <span th:text="${o.tilberedningstid} + ' min'"></span>
                        </span>
                        <span th:if="${o.porsjoner != null}">
                            <i class="fas fa-users"></i> <span th:text="${o.porsjoner} + ' pors.'"></span>
                        </span>
                        <span th:if="${o.vanskelighet != null}">
                            <i class="fas fa-signal"></i> <span th:text="${o.vanskelighet}"></span>
                        </span>
                    </div>
                    <a th:href="@{'/detaljer/' + ${o.id}}" class="kort-title" th:text="${o.tittel}">Tittel</a>
                    <div class="kort-actions">
                        <a th:href="@{'/detaljer/' + ${o.id}}" class="btn-see">
                            <i class="fa-solid fa-eye me-1"></i> Se
                        </a>
                        <button class="btn-save" th:attr="data-id=${o.id}" onclick="lagreOppskrift(this)">
                            <i class="fa-solid fa-bookmark me-1"></i> Lagre
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: bottom_nav}"></div>
    <div th:replace="~{fragments :: scripts}"></div>

    <script>
        function lagreOppskrift(btn) {
            if (btn.disabled) return;
            const id = btn.dataset.id;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Lagrer...';

            csrfFetch('/kopier/' + id, { method: 'POST', redirect: 'manual' })
                .then(() => {
                    btn.style.background = 'var(--mat-gronn-m)';
                    btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> Lagret!';
                })
                .catch(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-bookmark me-1"></i> Lagre';
                });
        }
    </script>
</body>
</html>
