<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Rediger Oppskrift | MatMinne</title>
    <style>
        body { background-color: var(--bakgrunn); }
        .form-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .input-group-custom {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #edf2f7;
        }
        .input-group-custom label {
            display: block;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--mat-mork);
            margin-bottom: 5px;
        }
        .input-group-custom input, .input-group-custom textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            outline: none;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <div class="form-container">
            <div class="text-center mb-5">
                <span style="font-size: 3rem;">✏️</span>
                <h2 class="fw-800 mt-2">Rediger oppskrift</h2>
            </div>

            <form th:action="@{/oppdater/{id}(id=${oppskrift.id})}" method="POST">
                
                <div class="input-group-custom">
                    <label>Tittel</label>
                    <input type="text" name="tittel" th:value="${oppskrift.tittel}" required>
                </div>

                <div class="input-group-custom">
                    <label>Bilde-URL</label>
                    <input type="url" name="bildeUrl" th:value="${oppskrift.bildeUrl}">
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label>Ingredienser</label>
                            <textarea name="ingredienser" rows="10" th:text="${oppskrift.ingredienser}"></textarea>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label>Fremgangsmåte</label>
                            <textarea name="fremgangsmate" rows="10" th:text="${oppskrift.fremgangsmate}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mb-4 px-2">
                    <span class="fw-bold">Gjør oppskriften offentlig?</span>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="erOffentlig" 
                               th:checked="${oppskrift.erOffentlig}" style="width: 50px; height: 25px;">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <a th:href="@{/detaljer/{id}(id=${oppskrift.id})}" class="btn btn-light btn-lg rounded-pill flex-grow-1">Avbryt</a>
                    <button type="submit" class="btn-mat btn-lg flex-grow-1">Lagre endringer</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
