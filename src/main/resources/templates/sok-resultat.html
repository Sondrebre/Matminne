<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Søk: Brukere | MatMinne</title>
</head>
<body style="background: var(--bakgrunn);">
    <div th:replace="~{fragments :: navbar}"></div>
    
    <div class="container py-5" style="max-width: 700px;">
        <h2 class="fw-800 mb-4">Søkeresultat for "<span th:text="${query}"></span>"</h2>
        
        <div th:each="bruker : ${treff}" class="card border-0 shadow-sm rounded-4 p-3 mb-3 d-flex flex-row align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <div style="width: 50px; height: 50px; background: var(--mat-gronn); color: white;" class="rounded-circle d-flex align-items-center justify-content-center fw-bold fs-5" th:text="${#strings.substring(bruker.key,0,1)}">U</div>
                <div>
                    <div class="fw-bold fs-5" th:text="${bruker.key}">Navn</div>
                    <div class="text-muted small" th:text="${bruker.value}">E-post</div>
                </div>
            </div>
            <a th:href="@{'/profil/' + ${bruker.value}}" class="btn btn-dark rounded-pill px-4 btn-sm fw-bold">Se profil</a>
        </div>

        <div th:if="${treff.isEmpty()}" class="text-center py-5">
            <p class="text-muted">Ingen kokker matchet søket ditt.</p>
        </div>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
