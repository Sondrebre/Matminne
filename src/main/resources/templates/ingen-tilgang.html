<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingen tilgang — MatMinne</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white; border-radius: 28px;
            border: 1.5px solid #bbf7d0;
            box-shadow: 0 20px 60px rgba(34,197,94,.1);
            padding: 52px 44px; max-width: 460px; width: 100%; text-align: center;
        }
        .icon {
            width: 72px; height: 72px; border-radius: 22px;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 28px;
        }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; color: #0f172a; margin-bottom: 12px; }
        p { font-size: .9rem; color: #64748b; line-height: 1.7; margin-bottom: 32px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f1f5f9; color: #475569; text-decoration: none;
            padding: 12px 24px; border-radius: 14px; font-weight: 800; font-size: .88rem;
            transition: .2s;
        }
        .back-btn:hover { background: #e2e8f0; color: #0f172a; }
        .note {
            margin-top: 24px; font-size: .75rem; color: #94a3b8; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>Ikke tilgang ennå</h1>
        <p>MatMinne er foreløpig kun tilgjengelig for inviterte brukere. Ta kontakt med den som delte lenken for å få tilgang.</p>
        <a href="/" class="back-btn">← Tilbake til forsiden</a>
        <p class="note">Prøvde du å logge inn med feil konto?<br>Logg inn med Google-kontoen du ble invitert med.</p>
    </div>
</body>
</html>
