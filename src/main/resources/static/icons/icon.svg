<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a3f"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Plate circle -->
  <circle cx="256" cy="230" r="130" fill="rgba(255,255,255,0.12)"/>
  <circle cx="256" cy="230" r="108" fill="rgba(255,255,255,0.08)"/>

  <!-- Fork -->
  <rect x="213" y="118" width="20" height="200" rx="10" fill="white"/>
  <!-- Fork tines -->
  <rect x="193" y="118" width="11" height="72" rx="5.5" fill="white"/>
  <rect x="233" y="118" width="11" height="72" rx="5.5" fill="white"/>
  <!-- Fork tine cross -->
  <rect x="193" y="178" width="51" height="13" rx="6" fill="white"/>

  <!-- Spoon -->
  <rect x="279" y="158" width="20" height="160" rx="10" fill="white"/>
  <ellipse cx="289" cy="136" rx="26" ry="34" fill="white"/>
  <ellipse cx="289" cy="136" rx="18" ry="24" fill="rgba(46,204,113,0.4)"/>

  <!-- Leaf accent top right -->
  <path d="M370 90 Q410 70 420 110 Q400 150 360 140 Q330 110 370 90Z" fill="url(#leaf)" opacity="0.9"/>
  <line x1="370" y1="90" x2="395" y2="125" stroke="rgba(46,204,113,0.6)" stroke-width="3" stroke-linecap="round"/>

  <!-- M letter bottom -->
  <text x="256" y="400" font-size="88" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        fill="white" letter-spacing="-2">MM</text>

  <!-- Bottom tagline dots -->
  <circle cx="226" cy="432" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="256" cy="432" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="286" cy="432" r="5" fill="rgba(255,255,255,0.4)"/>
</svg>
