<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a3f"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Plate circle -->
  <circle cx="256" cy="220" r="130" fill="rgba(255,255,255,0.12)"/>
  <circle cx="256" cy="220" r="108" fill="rgba(255,255,255,0.08)"/>

  <!-- Fork -->
  <rect x="213" y="108" width="20" height="200" rx="10" fill="white"/>
  <rect x="193" y="108" width="11" height="72" rx="5.5" fill="white"/>
  <rect x="233" y="108" width="11" height="72" rx="5.5" fill="white"/>
  <rect x="193" y="168" width="51" height="13" rx="6" fill="white"/>

  <!-- Spoon -->
  <rect x="279" y="148" width="20" height="160" rx="10" fill="white"/>
  <ellipse cx="289" cy="126" rx="26" ry="34" fill="white"/>
  <ellipse cx="289" cy="126" rx="18" ry="24" fill="rgba(46,204,113,0.4)"/>

  <!-- Leaf -->
  <path d="M370 85 Q410 65 420 105 Q400 145 360 135 Q330 105 370 85Z" fill="url(#leaf)" opacity="0.9"/>

  <!-- MM -->
  <text x="256" y="395" font-size="88" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        fill="white" letter-spacing="-2">MM</text>
</svg>
