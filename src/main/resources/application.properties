# Railway bruker dynamisk port via PORT-miljøvariabel
server.port=${PORT:8080}
spring.config.import=optional:classpath:priser.yml
server.forward-headers-strategy=NATIVE

# Database — bruker PostgreSQL på Railway, H2 lokalt
# På Railway: legg til PostgreSQL-service, kopier JDBC-URL fra dashbordet,
# og sett miljøvariabelen SPRING_DATASOURCE_URL=jdbc:postgresql://...
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./matminne_db;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
# PÅKREVD i produksjon: sett GOOGLE_CLIENT_ID og GOOGLE_CLIENT_SECRET som miljøvariabler
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=https://matminne-production.up.railway.app/login/oauth2/code/google
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Stripe (sett dine egne nøkler fra dashboard.stripe.com)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.price.id=${STRIPE_PRICE_ID:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
app.base.url=${APP_BASE_URL:http://localhost:8080}

# Hviteliste — kommaseparerte e-poster som får logge inn (tom = alle tillatt)
app.tillatte.epost=${TILLATTE_EPOST:}

# Kampanjekode for gratis AI-abonnement (sett via KAMPANJE_KODE miljøvariabel)
app.kampanje.kode=${KAMPANJE_KODE:Test123}

# Sikre session-cookies
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Aktiver denne når du kjører over HTTPS i produksjon:
# server.servlet.session.cookie.secure=true

# Ikke vis Spring-feildetaljer i nettleseren
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

# Thymeleaf — sett false under utvikling, true i produksjon
spring.thymeleaf.cache=false

# Logging — reduser støy i produksjon
logging.level.root=WARN
logging.level.com.example.matminne=INFO
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web.client=DEBUG

